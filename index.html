<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save Our Wildlife</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="page-container">

    <h1>Save Our Wildlife</h1>

    <video id="wildlifeVideo" controls width="100%">
      <source src="wildlife.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

  
    <p class="description">
      Every year, habitat loss and poaching push more species closer to extinction.
      Watch this short film to learn how our conservation efforts are helping protect
      endangered wildlife around the world, and how you can get involved.
    </p>

    
    <button id="toggleBtn" aria-label="Hide or play the wildlife video">
      Hide Video
    </button>

  </main>


  <script src="script.js"></script>
</body>
</html>
